modLoader = "javafml"
loaderVersion = "[1,)"
issueTrackerURL = "https://github.com/Infinituum17/FastConfigAPI/issues"
license = "MIT"

[[mods]]
modId = "${modid}"
version = "${version}"
displayName = "Fast Config API"
authors = "Infinituum"
description = '''
A mod that makes creating Configs easy and fast
'''
logoFile = "assets/${modid}/icon.png"

[[dependencies.${modid}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modid}]]
modId = "minecraft"
type = "required"
versionRange = "[${mc_version},)"
ordering = "NONE"
side = "BOTH"